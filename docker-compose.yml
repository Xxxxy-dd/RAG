services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rag
      MYSQL_USER: rag
      MYSQL_PASSWORD: ragpass
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    image: rag-backend:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379/0
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: rag
      MYSQL_PASSWORD: ragpass
      MYSQL_DATABASE: rag
      MYSQL_CHARSET: utf8mb4
      REDIS_EVENTS_STREAM: rag:events
      REDIS_EVENTS_GROUP: rag-persist-workers
      REDIS_INDEX_EVENTS_STREAM: rag:index-events
      REDIS_INDEX_EVENTS_GROUP: rag-index-workers
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    command: ["uvicorn", "rag.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/rag/indexes/chroma_db

  persist_worker:
    image: rag-backend:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379/0
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: rag
      MYSQL_PASSWORD: ragpass
      MYSQL_DATABASE: rag
      MYSQL_CHARSET: utf8mb4
      REDIS_EVENTS_STREAM: rag:events
      REDIS_EVENTS_GROUP: rag-persist-workers
      REDIS_EVENTS_CONSUMER: persist-worker-1
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    command: ["python", "-m", "rag.workers.persist_worker"]

  vector_worker:
    image: rag-backend:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379/0
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: rag
      MYSQL_PASSWORD: ragpass
      MYSQL_DATABASE: rag
      MYSQL_CHARSET: utf8mb4
      REDIS_INDEX_EVENTS_STREAM: rag:index-events
      REDIS_INDEX_EVENTS_GROUP: rag-index-workers
      REDIS_INDEX_EVENTS_CONSUMER: vector-worker-1
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: ["python", "-m", "rag.workers.vector_worker"]
    volumes:
      - chroma_data:/app/rag/indexes/chroma_db

  frontend:
    image: rag-frontend:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-docker.m.daocloud.io/library/nginx:1.27-alpine}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  redis_data:
  mysql_data:
  chroma_data:
