name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check rag/observability.py rag/workers/reliability.py tests/test_trace_and_worker_reliability.py --ignore W191

      - name: Mypy type check
        run: mypy rag/observability.py rag/workers/reliability.py --ignore-missing-imports --follow-imports=skip

      - name: Pytest
        run: pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production-like Compose config
        run: docker compose config --quiet

      - name: Validate development Compose config
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config --quiet

      - name: Validate smoke-check CLI
        run: python scripts/smoke_check.py --help
