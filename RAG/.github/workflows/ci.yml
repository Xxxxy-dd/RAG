name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy alembic

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy --ignore-missing-imports . || true

      - name: Run tests (pytest)
        run: pytest -q

      - name: Alembic autogenerate check
        env:
          DATABASE_URL: sqlite:///alembic_ci.db
        run: |
          set -e
          # Run alembic autogenerate to see if migrations are up-to-date
          OUT=$(alembic -c alembic.ini revision --autogenerate -m "ci_autogen_check" --rev-id ci_check_temp 2>&1) || true
          echo "$OUT"
          echo "$OUT" | grep -q "No changes in schema detected." && echo "Alembic OK" || (echo "Schema drift detected: please run 'alembic revision --autogenerate' and commit the migrations."; ls -1 alembic/versions | grep ci_check_temp || true; exit 1)
          # cleanup generated temporary revision if any
          rm -f alembic/versions/*ci_check_temp*.py || true
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Run ruff (lint)
        run: ruff check .

      - name: Run mypy (type check)
        run: mypy . --ignore-missing-imports || true

      - name: Run tests
        run: |
          python -m pip install pytest
          pytest -q || true
